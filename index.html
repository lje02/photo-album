<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公开相册 - Public Album</title>
    <style>
        :root {
            --bg: #f5f5f5;
            --card-bg: #fff;
            --text: #333;
            --text-sec: #777;
            --border: #e0e0e0;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            --shadow-hov: 0 8px 30px rgba(0, 0, 0, 0.15);
            --accent: #4a90d9;
            --accent-hov: #357abd;
            --accent-light: #e8f2fb;
            --danger: #e05555;
            --danger-hov: #c74444;
            --overlay: rgba(0, 0, 0, 0.9);
            --rad: 12px;
            --rad-sm: 8px;
            --rad-xs: 4px;
            --trans: 0.25s ease;
            --max-w: 1400px;
            --hdr-h: 60px;
            --gap: 16px;
            --tag-bg: #eef4fb;
            --tag-text: #4a7fc4;
            --tag-active-bg: #4a90d9;
            --tag-active-text: #fff;
            --cat-bg: #f0f0f5;
            --cat-text: #666;
            --cat-active-bg: #4a90d9;
            --cat-active-text: #fff;
        }
        @media(prefers-color-scheme:dark) {
            :root {
                --bg: #1a1a1f;
                --card-bg: #252530;
                --text: #e0e0e0;
                --text-sec: #aaa;
                --border: #3a3a45;
                --shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
                --shadow-hov: 0 8px 30px rgba(0, 0, 0, 0.5);
                --accent: #5ba0e8;
                --accent-hov: #4a8dd4;
                --accent-light: #1e2d3d;
                --overlay: rgba(0, 0, 0, 0.95);
                --tag-bg: #2a3040;
                --tag-text: #8ab8e8;
                --tag-active-bg: #5ba0e8;
                --tag-active-text: #fff;
                --cat-bg: #2a2a35;
                --cat-text: #aaa;
                --cat-active-bg: #5ba0e8;
                --cat-active-text: #fff;
            }
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
            transition: all var(--trans);
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        /* Header */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            height: var(--hdr-h);
            display: flex;
            align-items: center;
            padding: 0 20px;
        }
        .header-inner {
            max-width: var(--max-w);
            width: 100%;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }
        .logo {
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--text);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .logo svg {
            width: 28px;
            height: 28px;
            flex-shrink: 0;
        }
        .header-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: .88rem;
            font-weight: 500;
            cursor: pointer;
            border: 1.5px solid transparent;
            transition: var(--trans);
            background: 0 0;
            color: var(--text);
            white-space: nowrap;
            font-family: inherit;
            letter-spacing: 0.01em;
        }
        .btn-outline {
            border-color: var(--border);
        }
        .btn-outline:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-light);
        }
        .btn-primary {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }
        .btn-primary:hover {
            background: var(--accent-hov);
            border-color: var(--accent-hov);
        }
        .btn-danger {
            background: var(--danger);
            color: #fff;
            border-color: var(--danger);
        }
        .btn-danger:hover {
            background: var(--danger-hov);
            border-color: var(--danger-hov);
        }
        .btn-sm {
            padding: 5px 12px;
            font-size: .8rem;
            border-radius: 16px;
        }
        .btn-xs {
            padding: 3px 8px;
            font-size: .7rem;
            border-radius: 12px;
        }

        /* Category Filter */
        .category-bar {
            max-width: var(--max-w);
            margin: 12px auto 0;
            padding: 0 20px;
            display: flex;
            gap: 6px;
            overflow-x: auto;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
            flex-wrap: nowrap;
            align-items: center;
        }
        .category-bar::-webkit-scrollbar {
            display: none;
        }
        .cat-chip {
            padding: 6px 14px;
            border-radius: 18px;
            font-size: .82rem;
            cursor: pointer;
            border: 1.5px solid var(--border);
            background: var(--cat-bg);
            color: var(--cat-text);
            white-space: nowrap;
            transition: var(--trans);
            flex-shrink: 0;
            font-weight: 500;
        }
        .cat-chip:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-light);
        }
        .cat-chip.active {
            background: var(--cat-active-bg);
            color: var(--cat-active-text);
            border-color: var(--cat-active-bg);
            font-weight: 600;
        }

        /* Album Tabs */
        .album-tabs {
            max-width: var(--max-w);
            margin: 8px auto 0;
            padding: 0 20px;
            display: flex;
            gap: 6px;
            overflow-x: auto;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
            align-items: center;
        }
        .album-tabs::-webkit-scrollbar {
            display: none;
        }
        .album-tab {
            padding: 7px 16px;
            border-radius: 18px;
            font-size: .85rem;
            cursor: pointer;
            border: 1.5px solid transparent;
            background: var(--card-bg);
            color: var(--text-sec);
            white-space: nowrap;
            transition: var(--trans);
            flex-shrink: 0;
            position: relative;
            font-weight: 500;
        }
        .album-tab:hover {
            color: var(--text);
            border-color: var(--border);
            background: var(--bg);
        }
        .album-tab.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
            font-weight: 600;
        }
        .album-tab .tab-edit-dot {
            display: none;
            position: absolute;
            top: -2px;
            right: -2px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            border: 1.5px solid var(--card-bg);
        }
        .admin-mode-global .album-tab .tab-edit-dot {
            display: block;
        }

        /* Tag Filter */
        .tag-filter-bar {
            max-width: var(--max-w);
            margin: 10px auto 0;
            padding: 0 20px;
            display: flex;
            gap: 6px;
            overflow-x: auto;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
            flex-wrap: nowrap;
            align-items: center;
            min-height: 32px;
        }
        .tag-filter-bar::-webkit-scrollbar {
            display: none;
        }
        .tag-filter-label {
            font-size: .75rem;
            color: var(--text-sec);
            flex-shrink: 0;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }
        .tag-chip {
            padding: 4px 11px;
            border-radius: 14px;
            font-size: .76rem;
            cursor: pointer;
            border: 1.5px solid var(--border);
            background: var(--tag-bg);
            color: var(--tag-text);
            white-space: nowrap;
            transition: var(--trans);
            flex-shrink: 0;
            font-weight: 500;
        }
        .tag-chip:hover {
            border-color: var(--accent);
            background: var(--accent-light);
        }
        .tag-chip.active {
            background: var(--tag-active-bg);
            color: var(--tag-active-text);
            border-color: var(--tag-active-bg);
            font-weight: 600;
        }
        .tag-chip .tag-count {
            font-size: .68rem;
            opacity: 0.7;
            margin-left: 2px;
        }
        .tag-clear {
            font-size: .7rem;
            color: var(--danger);
            cursor: pointer;
            flex-shrink: 0;
            padding: 4px 8px;
            border-radius: 12px;
            border: 1px dashed var(--danger);
            background: transparent;
            display: none;
            white-space: nowrap;
        }
        .tag-clear.visible {
            display: inline-block;
        }
        .tag-clear:hover {
            background: rgba(224, 85, 85, 0.08);
        }

        /* Gallery */
        .gallery-container {
            max-width: var(--max-w);
            margin: 16px auto;
            padding: 0 20px;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: var(--gap);
        }
        .photo-card {
            position: relative;
            border-radius: var(--rad);
            overflow: hidden;
            background: var(--card-bg);
            box-shadow: var(--shadow);
            cursor: pointer;
            aspect-ratio: 4/3;
            transition: var(--trans);
            group: photo-card;
        }
        .photo-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-hov);
        }
        .photo-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform .4s;
            display: block;
        }
        .photo-card:hover img {
            transform: scale(1.05);
        }
        .photo-card-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 28px 10px 10px;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.75));
            opacity: 0;
            transition: var(--trans);
            pointer-events: none;
            display: flex;
            flex-direction: column;
            gap: 4px;
            align-items: flex-start;
        }
        .photo-card:hover .photo-card-overlay {
            opacity: 1;
        }
        .photo-card-title {
            color: #fff;
            font-size: .85rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            display: block;
            font-weight: 500;
            max-width: 100%;
        }
        .photo-card-tags {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            pointer-events: auto;
        }
        .photo-card-tag {
            font-size: .65rem;
            padding: 2px 7px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.22);
            color: #fff;
            white-space: nowrap;
            backdrop-filter: blur(4px);
            pointer-events: auto;
            cursor: pointer;
            transition: var(--trans);
        }
        .photo-card-tag:hover {
            background: rgba(255, 255, 255, 0.4);
        }
        .btn-del-photo {
            position: absolute;
            top: 8px;
            right: 8px;
            background: var(--danger);
            color: #fff;
            border: none;
            border-radius: 4px;
            padding: 4px 9px;
            font-size: .78rem;
            cursor: pointer;
            display: none;
            z-index: 3;
            pointer-events: auto;
            transition: var(--trans);
            font-family: inherit;
        }
        .btn-del-photo:hover {
            background: #c74444;
            transform: scale(1.05);
        }
        .photo-card.admin-mode .btn-del-photo {
            display: block;
        }
        .empty-state {
            grid-column: 1/-1;
            text-align: center;
            padding: 60px 20px;
            color: var(--text-sec);
        }
        .empty-state svg {
            width: 64px;
            height: 64px;
            opacity: 0.3;
            margin-bottom: 16px;
        }
        .skeleton {
            border-radius: var(--rad);
            aspect-ratio: 4/3;
            background: linear-gradient(90deg, var(--card-bg) 25%, var(--border) 50%, var(--card-bg) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }
            100% {
                background-position: -200% 0;
            }
        }

        /* Lightbox */
        .lightbox {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: var(--overlay);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity .3s;
            cursor: pointer;
        }
        .lightbox.active {
            opacity: 1;
            pointer-events: auto;
        }
        .lightbox img {
            max-width: 90vw;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 8px;
            user-select: none;
            cursor: default;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        .lb-btn {
            position: absolute;
            background: rgba(255, 255, 255, 0.15);
            border: none;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: var(--trans);
            font-family: inherit;
            z-index: 2;
        }
        .lb-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.08);
        }
        .lb-close {
            top: 16px;
            right: 20px;
            width: 44px;
            height: 44px;
            font-size: 1.5rem;
        }
        .lb-nav {
            top: 50%;
            transform: translateY(-50%);
            width: 48px;
            height: 48px;
            font-size: 1.5rem;
        }
        .lb-nav.prev {
            left: 12px;
        }
        .lb-nav.next {
            right: 12px;
        }
        .lb-info {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            background: rgba(0, 0, 0, 0.55);
            padding: 6px 18px;
            border-radius: 20px;
            font-size: .85rem;
            z-index: 2;
            pointer-events: none;
            white-space: nowrap;
        }
        .lb-tags-inline {
            display: inline-flex;
            gap: 4px;
            margin-left: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .lb-tags-inline span {
            font-size: .7rem;
            padding: 2px 7px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.2);
            font-weight: 400;
        }

        /* Modals */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 9000;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: .25s;
            padding: 16px;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal {
            background: var(--card-bg);
            border-radius: var(--rad);
            width: 100%;
            max-width: 520px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 24px;
            position: relative;
            transform: translateY(20px);
            transition: .25s;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
        }
        .modal-overlay.active .modal {
            transform: translateY(0);
        }
        .modal h3 {
            margin-bottom: 16px;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .form-group {
            margin-bottom: 14px;
        }
        .form-group label {
            display: block;
            font-size: .83rem;
            margin-bottom: 5px;
            font-weight: 600;
            color: var(--text);
        }
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1.5px solid var(--border);
            border-radius: var(--rad-sm);
            background: var(--bg);
            color: var(--text);
            font-family: inherit;
            font-size: .9rem;
            transition: var(--trans);
        }
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            border-color: var(--accent);
            outline: none;
            box-shadow: 0 0 0 3px rgba(74, 144, 217, 0.1);
        }
        .form-group textarea {
            resize: vertical;
            min-height: 60px;
        }
        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: var(--rad);
            padding: 28px;
            text-align: center;
            cursor: pointer;
            transition: var(--trans);
            background: var(--bg);
        }
        .upload-zone:hover,
        .upload-zone.drag-over {
            border-color: var(--accent);
            background: var(--accent-light);
        }
        .upload-zone p {
            color: var(--text-sec);
            font-size: .88rem;
            pointer-events: none;
        }
        .upload-preview {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .upload-preview img {
            width: 56px;
            height: 56px;
            object-fit: cover;
            border-radius: 6px;
            border: 2px solid var(--border);
        }
        .tag-input-wrap {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            align-items: center;
            padding: 6px 8px;
            border: 1.5px solid var(--border);
            border-radius: var(--rad-sm);
            background: var(--bg);
            cursor: text;
            min-height: 40px;
        }
        .tag-input-wrap:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(74, 144, 217, 0.1);
        }
        .tag-input-wrap .tag-item {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            padding: 3px 8px;
            border-radius: 12px;
            background: var(--tag-bg);
            color: var(--tag-text);
            font-size: .78rem;
            font-weight: 500;
            white-space: nowrap;
        }
        .tag-input-wrap .tag-item .tag-remove {
            cursor: pointer;
            font-size: .9rem;
            line-height: 1;
            opacity: 0.6;
            transition: var(--trans);
        }
        .tag-input-wrap .tag-item .tag-remove:hover {
            opacity: 1;
            color: var(--danger);
        }
        .tag-input-wrap input {
            border: none;
            outline: none;
            background: transparent;
            flex: 1;
            min-width: 80px;
            padding: 4px;
            font-size: .85rem;
            color: var(--text);
            font-family: inherit;
        }

        /* Toast */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }
        .toast {
            padding: 12px 18px;
            border-radius: var(--rad-sm);
            color: #fff;
            animation: slideIn .3s, fadeOut .3s 2.5s forwards;
            font-size: .88rem;
            font-weight: 500;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.25);
            pointer-events: auto;
        }
        .toast.success {
            background: #4caf84;
        }
        .toast.error {
            background: #e05555;
        }
        .toast.info {
            background: #5ba0e8;
        }
        @keyframes slideIn {
            from {
                transform: translateX(120%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        @keyframes fadeOut {
            to {
                opacity: 0;
                transform: translateY(-10px);
            }
        }

        .settings-bar {
            max-width: var(--max-w);
            margin: 6px auto 0;
            padding: 0 20px;
            font-size: .78rem;
            color: var(--text-sec);
        }
        .pic-count {
            font-size: .78rem;
            color: var(--text-sec);
            text-align: center;
            margin-top: 8px;
        }

        @media(max-width:768px) {
            .gallery {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }
            :root {
                --gap: 8px;
                --hdr-h: 52px;
            }
            .lb-nav {
                width: 36px;
                height: 36px;
                font-size: 1.1rem;
            }
            .lb-close {
                width: 36px;
                height: 36px;
                font-size: 1.2rem;
                top: 10px;
                right: 10px;
            }
            .btn {
                padding: 6px 12px;
                font-size: .8rem;
                border-radius: 16px;
            }
            .header-actions {
                gap: 4px;
            }
            .header {
                padding: 0 10px;
            }
            .category-bar {
                padding: 0 10px;
                gap: 4px;
            }
            .album-tabs {
                padding: 0 10px;
                gap: 4px;
            }
            .tag-filter-bar {
                padding: 0 10px;
                gap: 4px;
            }
            .gallery-container {
                padding: 0 10px;
            }
            .modal {
                padding: 16px;
                max-width: 95vw;
                border-radius: var(--rad-sm);
            }
            .logo {
                font-size: 1.1rem;
                gap: 4px;
            }
            .logo svg {
                width: 22px;
                height: 22px;
            }
        }
        @media(max-width:400px) {
            .gallery {
                grid-template-columns: 1fr 1fr;
                gap: 6px;
            }
            .btn-sm {
                padding: 4px 8px;
                font-size: .72rem;
            }
            .cat-chip {
                padding: 4px 10px;
                font-size: .74rem;
            }
            .album-tab {
                padding: 5px 11px;
                font-size: .76rem;
            }
            .tag-chip {
                padding: 3px 8px;
                font-size: .7rem;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <a href="/" class="logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                公开相册
            </a>
            <div class="header-actions">
                <button class="btn btn-outline btn-sm admin-only" id="btnAddAlbum" style="display:none">📁 新建相册</button>
                <button class="btn btn-primary btn-sm admin-only" id="btnAddPhoto" style="display:none">📷 添加图片</button>
                <button class="btn btn-outline btn-sm admin-only" id="btnSettings" style="display:none">⚙️ 设置</button>
                <button class="btn btn-outline btn-sm admin-only" id="btnLogout" style="display:none">🚪 退出</button>
            </div>
        </div>
    </header>

    <!-- 分类筛选 -->
    <nav class="category-bar" id="categoryBar"></nav>

    <!-- 相册标签 -->
    <nav class="album-tabs" id="albumTabs"></nav>

    <!-- 标签筛选 -->
    <div class="tag-filter-bar" id="tagFilterBar"></div>

    <div class="settings-bar admin-only" style="display:none">
        存储模式: <strong id="storageModeLabel">本地存储</strong>
        <span style="margin-left:12px;">| 图片数: <strong id="totalPicCount">0</strong></span>
    </div>

    <main class="gallery-container">
        <div class="gallery" id="gallery"></div>
        <div class="pic-count" id="picCountInfo"></div>
    </main>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <button class="lb-btn lb-close" id="lbClose" aria-label="关闭">✕</button>
        <button class="lb-btn lb-nav prev" id="lbPrev" aria-label="上一张">◀</button>
        <button class="lb-btn lb-nav next" id="lbNext" aria-label="下一张">▶</button>
        <div id="lbContent"></div>
        <div class="lb-info" id="lbInfo"></div>
    </div>

    <!-- 认证弹窗 -->
    <div class="modal-overlay" id="modalAuth"><div class="modal">
                <h3>🔐 管理员验证</h3>
                <div class="form-group"><input type="password" id="authPwd" placeholder="输入管理密码" autocomplete="off"></div>
                <div style="text-align:right"><button class="btn btn-primary btn-sm" id="btnAuth">验证</button></div>
    </div></div>

    <!-- 相册编辑弹窗 -->
    <div class="modal-overlay" id="modalAlbum"><div class="modal">
                <h3 id="albumTitle">📁 新建相册</h3><input type="hidden" id="editAlbumId">
                <div class="form-group"><label>相册名称</label><input type="text" id="albumName" placeholder="输入相册名称"></div>
                <div class="form-group"><label>分类</label><select id="albumCategory"></select></div>
                <div class="form-group"><label>描述（可选）</label><textarea id="albumDesc" placeholder="相册描述…" rows="2"></textarea></div>
                <div style="display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap;">
                    <button class="btn btn-danger btn-sm" id="btnDelAlbum" style="display:none">🗑️ 删除相册</button>
                    <button class="btn btn-outline btn-sm close-modal">取消</button>
                    <button class="btn btn-primary btn-sm" id="btnSaveAlbum">保存</button>
                </div>
    </div></div>

    <!-- 添加图片弹窗 -->
    <div class="modal-overlay" id="modalPhoto"><div class="modal">
                <h3>📷 添加图片</h3>
                <div class="form-group"><label>目标相册</label><select id="selAlbum"></select></div>
                <div class="form-group">
                    <label>上传图片</label>
                    <div class="upload-zone" id="dropZone"><p>📂 点击选择或拖拽图片到此处（最大20MB/张）</p></div>
                    <input type="file" id="fileInp" accept="image/*" multiple style="display:none">
                    <div class="upload-preview" id="previewBox"></div>
                </div>
                <div class="form-group">
                    <label>或粘贴图片URL（每行一个）</label>
                    <textarea id="urlInp" placeholder="https://example.com/image.jpg" rows="3"></textarea>
                </div>
                <div class="form-group"><label>图片统一标题（可选）</label><input type="text" id="picTitle" placeholder="标题"></div>
                <div class="form-group">
                    <label>标签（按回车或逗号添加）</label>
                    <div class="tag-input-wrap" id="tagInputWrap">
                        <input type="text" id="tagInput" placeholder="输入标签…">
                    </div>
                </div>
                <div style="text-align:right;display:flex;gap:10px;justify-content:flex-end;">
                    <button class="btn btn-outline btn-sm close-modal">取消</button>
                    <button class="btn btn-primary btn-sm" id="btnSavePhoto">添加</button>
                </div>
    </div></div>

    <!-- 设置弹窗 -->
    <div class="modal-overlay" id="modalSettings"><div class="modal">
                <h3>⚙️ 系统设置</h3>
                <div class="form-group">
                    <label>存储模式</label>
                    <select id="setMode"><option value="local">本地存储</option><option value="smms">SM.MS 图床</option><option value="url_only">仅URL模式</option></select>
                </div>
                <div class="form-group" id="smmsGrp" style="display:none;"><label>SM.MS API Token</label><input type="text" id="setToken" placeholder="粘贴Token"></div>
                <div class="form-group"><label>修改管理密码（不改请留空）</label><input type="password" id="setPwd" placeholder="新密码"></div>
                <div style="text-align:right;display:flex;gap:10px;justify-content:flex-end;">
                    <button class="btn btn-outline btn-sm close-modal">取消</button>
                    <button class="btn btn-primary btn-sm" id="btnSaveSet">保存</button>
                </div>
    </div></div>

    <div class="toast-container" id="toastBox"></div>

    <script>
        (function() {
            // ============ 工具函数 ============
            const $ = s => document.querySelector(s);
            const $$ = s => document.querySelectorAll(s);
            const esc = s => {
                const d = document.createElement('div');
                d.textContent = s;
                return d.innerHTML;
            };
            const toast = (m, type = 'info') => {
                const t = document.createElement('div');
                t.className = `toast ${type}`;
                t.textContent = m;
                $('#toastBox').appendChild(t);
                setTimeout(() => { if (t.parentNode) t.remove(); }, 3000);
            };

            // ============ 预设分类 ============
            const CATEGORIES = [
                { id: 'all', name: '🌟 全部', icon: '🌟' },
                { id: 'travel', name: '✈️ 旅行', icon: '✈️' },
                { id: 'life', name: '🏠 生活', icon: '🏠' },
                { id: 'work', name: '💼 工作', icon: '💼' },
                { id: 'food', name: '🍔 美食', icon: '🍔' },
                { id: 'nature', name: '🌿 自然', icon: '🌿' },
                { id: 'city', name: '🏙️ 城市', icon: '🏙️' },
                { id: 'people', name: '👤 人物', icon: '👤' },
                { id: 'other', name: '📦 其他', icon: '📦' },
            ];

            // ============ 全局状态 ============
            const ST = {
                admin: false,
                tk: '',
                albs: [],
                pics: [], // 当前相册的图片（未经过标签筛选）
                allPicsCache: [], // 全部图片缓存（用于标签提取）
                curAlb: 'all',
                filterCategory: 'all',
                filterTags: [],
                lbIdx: -1,
                mode: 'local',
                files: [],
                tagInputTags: [], // 添加图片时的临时标签
            };

            // ============ API ============
            const API = {
                async req(path, opt = {}) {
                    const h = { ...opt.headers };
                    if (ST.tk) h['X-Admin-Token'] = ST.tk;
                    if (!(opt.body instanceof FormData)) h['Content-Type'] = 'application/json';
                    try {
                        const r = await fetch(path.startsWith('http') ? path : `/api${path}`, { ...opt,
                            headers: h });
                        const d = await r.json();
                        if (!r.ok) throw new Error(d.detail || '请求失败');
                        return d;
                    } catch (e) {
                        if (e.name === 'TypeError') throw new Error('网络异常，请检查连接');
                        throw e;
                    }
                }
            };

            // ============ 管理员UI更新 ============
            const updateUI = () => {
                $$('.admin-only').forEach(e => e.style.display = ST.admin ? '' : 'none');
                $$('.photo-card').forEach(c => c.classList.toggle('admin-mode', ST.admin));
                document.body.classList.toggle('admin-mode-global', ST.admin);
            };

            // ============ Hash检测（管理员入口） ============
            const checkHash = () => {
                if (location.hash === '#/admin') {
                    history.replaceState(null, null, window.location.pathname);
                    $$('.modal-overlay').forEach(m => m.classList.remove('active'));
                    $('#modalAuth').classList.add('active');
                    setTimeout(() => $('#authPwd').focus(), 150);
                }
            };

            const auth = async p => {
                if (!p) return toast('请输入密码', 'error');
                try {
                    const d = await API.req('/auth', { method: 'POST', body: JSON.stringify({ password: p }) });
                    ST.tk = d.token;
                    ST.admin = true;
                    localStorage.setItem('tk', d.token);
                    updateUI();
                    $('#modalAuth').classList.remove('active');
                    $('#authPwd').value = '';
                    toast('✅ 验证成功', 'success');
                    await loadAll();
                } catch (e) { toast('❌ ' + e.message, 'error'); }
            };

            // ============ 核心数据加载 ============
            const loadAll = async () => {
                try {
                    const [a, pAll, s] = await Promise.all([
                        API.req('/albums'),
                        API.req('/photos'),
                        ST.admin ? API.req('/settings') : Promise.resolve({}),
                    ]);
                    ST.albs = a.albums || [];
                    ST.allPicsCache = pAll.photos || [];

                    // 根据当前相册筛选图片
                    if (ST.curAlb === 'all') {
                        ST.pics = [...ST.allPicsCache];
                    } else {
                        ST.pics = ST.allPicsCache.filter(p => String(p.album_id) === String(ST.curAlb));
                    }

                    if (ST.admin) {
                        ST.mode = s.storage_mode || 'local';
                        $('#setMode').value = ST.mode;
                        $('#setToken').value = s.smms_token || '';
                        $('#storageModeLabel').textContent = ST.mode === 'local' ? '本地存储' : (ST.mode === 'smms' ?
                            'SM.MS 图床' : 'URL模式');
                        $('#smmsGrp').style.display = ST.mode === 'smms' ? '' : 'none';
                        $('#totalPicCount').textContent = ST.allPicsCache.length;
                    }
                    renderCategoryBar();
                    renderTabs();
                    renderTagFilter();
                    renderGal();
                } catch (e) {
                    console.error('加载失败:', e);
                    ST.albs = [];
                    ST.pics = [];
                    ST.allPicsCache = [];
                    renderCategoryBar();
                    renderTabs();
                    renderTagFilter();
                    renderGal();
                }
            };

            // ============ 分类筛选栏 ============
            const renderCategoryBar = () => {
                let h = '';
                CATEGORIES.forEach(cat => {
                    const active = ST.filterCategory === cat.id ? ' active' : '';
                    h +=
                    `<button class="cat-chip${active}" data-cat="${cat.id}" title="${cat.name}">${cat.name}</button>`;
                });
                $('#categoryBar').innerHTML = h;
            };

            $('#categoryBar').onclick = e => {
                const chip = e.target.closest('.cat-chip');
                if (!chip) return;
                ST.filterCategory = chip.dataset.cat;
                // 重置相册选择
                ST.curAlb = 'all';
                // 根据分类过滤相册列表
                const filteredAlbs = ST.filterCategory === 'all' ?
                    ST.albs :
                    ST.albs.filter(a => (a.category || 'other') === ST.filterCategory);
                // 如果当前相册不在过滤结果中，重置为all
                if (ST.curAlb !== 'all' && !filteredAlbs.find(a => String(a.id) === String(ST.curAlb))) {
                    ST.curAlb = 'all';
                }
                // 更新图片列表
                if (ST.curAlb === 'all') {
                    ST.pics = [...ST.allPicsCache];
                    if (ST.filterCategory !== 'all') {
                        const catAlbumIds = filteredAlbs.map(a => String(a.id));
                        ST.pics = ST.pics.filter(p => catAlbumIds.includes(String(p.album_id)));
                    }
                } else {
                    ST.pics = ST.allPicsCache.filter(p => String(p.album_id) === String(ST.curAlb));
                }
                ST.filterTags = [];
                renderCategoryBar();
                renderTabs();
                renderTagFilter();
                renderGal();
            };

            // ============ 相册Tab ============
            const renderTabs = () => {
                const filteredAlbs = ST.filterCategory === 'all' ?
                    ST.albs :
                    ST.albs.filter(a => (a.category || 'other') === ST.filterCategory);

                let h = `<button class="album-tab ${ST.curAlb==='all'?'active':''}" data-id="all">📷 全部<span class="tab-edit-dot"></span></button>`;
                filteredAlbs.forEach(a => {
                    const catInfo = CATEGORIES.find(c => c.id === (a.category || 'other'));
                    const catIcon = catInfo ? catInfo.icon : '📦';
                    h +=
                    `<button class="album-tab ${ST.curAlb===String(a.id)?'active':''}" data-id="${a.id}" data-category="${a.category||'other'}" title="${esc(a.description||'')}">${catIcon} ${esc(a.name)}<span class="tab-edit-dot"></span></button>`;
                });
                $('#albumTabs').innerHTML = h;
            };

            $('#albumTabs').onclick = e => {
                const t = e.target.closest('.album-tab');
                if (!t) return;
                ST.curAlb = t.dataset.id;
                ST.filterTags = [];
                if (ST.curAlb === 'all') {
                    ST.pics = [...ST.allPicsCache];
                    if (ST.filterCategory !== 'all') {
                        const filteredAlbs = ST.filterCategory === 'all' ? ST.albs : ST.albs.filter(a => (a
                            .category || 'other') === ST.filterCategory);
                        const catAlbumIds = filteredAlbs.map(a => String(a.id));
                        ST.pics = ST.pics.filter(p => catAlbumIds.includes(String(p.album_id)));
                    }
                } else {
                    ST.pics = ST.allPicsCache.filter(p => String(p.album_id) === String(ST.curAlb));
                }
                renderTabs();
                renderTagFilter();
                renderGal();
            };

            // 右键编辑相册（管理员模式）
            $('#albumTabs').oncontextmenu = e => {
                if (!ST.admin) return;
                const t = e.target.closest('.album-tab');
                if (!t || t.dataset.id === 'all') return;
                e.preventDefault();
                const albId = t.dataset.id;
                const alb = ST.albs.find(a => String(a.id) === String(albId));
                if (!alb) return;
                openAlbumEditor(alb);
            };

            const openAlbumEditor = (alb) => {
                $('#editAlbumId').value = alb.id;
                $('#albumName').value = alb.name || '';
                $('#albumDesc').value = alb.description || '';
                $('#albumCategory').value = alb.category || 'other';
                $('#btnDelAlbum').style.display = 'inline-flex';
                $('#albumTitle').textContent = '📁 编辑相册';
                $('#modalAlbum').classList.add('active');
            };

            // ============ 标签筛选栏 ============
            const getAllTagsFromPics = () => {
                const tagSet = new Set();
                const sourcePics = ST.curAlb === 'all' ?
                    (ST.filterCategory === 'all' ? ST.allPicsCache : ST.pics) :
                    ST.pics;
                sourcePics.forEach(p => {
                    if (p.tags) {
                        const tags = typeof p.tags === 'string' ? p.tags.split(',').map(t => t.trim()).filter(
                            t => t) : (Array.isArray(p.tags) ? p.tags : []);
                        tags.forEach(t => tagSet.add(t));
                    }
                });
                return Array.from(tagSet).sort((a, b) => a.localeCompare(b, 'zh'));
            };

            const renderTagFilter = () => {
                const allTags = getAllTagsFromPics();
                const bar = $('#tagFilterBar');
                if (allTags.length === 0) {
                    bar.innerHTML = '';
                    return;
                }
                let h = '<span class="tag-filter-label">🏷️ 标签</span>';
                allTags.forEach(tag => {
                    const active = ST.filterTags.includes(tag) ? ' active' : '';
                    const count = ST.pics.filter(p => {
                        const ptags = typeof p.tags === 'string' ? p.tags.split(',').map(t => t.trim()).filter(
                            t => t) : (Array.isArray(p.tags) ? p.tags : []);
                        return ptags.includes(tag);
                    }).length;
                    h +=
                    `<button class="tag-chip${active}" data-tag="${esc(tag)}">${esc(tag)}<span class="tag-count">${count}</span></button>`;
                });
                h +=
                `<button class="tag-clear${ST.filterTags.length>0?' visible':''}" id="tagClearAll">✕ 清除筛选</button>`;
                bar.innerHTML = h;
            };

            $('#tagFilterBar').onclick = e => {
                const chip = e.target.closest('.tag-chip');
                if (chip) {
                    const tag = chip.dataset.tag;
                    const idx = ST.filterTags.indexOf(tag);
                    if (idx >= 0) {
                        ST.filterTags.splice(idx, 1);
                    } else {
                        ST.filterTags.push(tag);
                    }
                    renderTagFilter();
                    renderGal();
                    return;
                }
                const clearBtn = e.target.closest('#tagClearAll');
                if (clearBtn) {
                    ST.filterTags = [];
                    renderTagFilter();
                    renderGal();
                }
            };

            // ============ 图片展示 ============
            const getFilteredPics = () => {
                let pics = [...ST.pics];
                if (ST.filterTags.length > 0) {
                    pics = pics.filter(p => {
                        const ptags = typeof p.tags === 'string' ?
                            p.tags.split(',').map(t => t.trim()).filter(t => t) :
                            (Array.isArray(p.tags) ? p.tags : []);
                        return ST.filterTags.some(ft => ptags.includes(ft));
                    });
                }
                return pics;
            };

            const renderGal = () => {
                const g = $('#gallery');
                const filtered = getFilteredPics();
                $('#picCountInfo').textContent = filtered.length > 0 ? `共 ${filtered.length} 张图片` : '';

                if (!filtered.length) {
                    g.innerHTML = `<div class="empty-state">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                <h3>暂无图片</h3><p style="font-size:.85rem;margin-top:4px;">${ST.filterTags.length>0?'尝试清除标签筛选':(ST.admin?'点击"添加图片"开始':'')}</p></div>`;
                    return;
                }
                g.innerHTML = filtered.map((p, i) => {
                    const ptags = typeof p.tags === 'string' ?
                        p.tags.split(',').map(t => t.trim()).filter(t => t) :
                        (Array.isArray(p.tags) ? p.tags : []);
                    const tagsHtml = ptags.slice(0, 3).map(t =>
                        `<span class="photo-card-tag" data-tag="${esc(t)}">${esc(t)}</span>`).join(
                        '');
                    const moreTag = ptags.length > 3 ?
                        `<span class="photo-card-tag">+${ptags.length-3}</span>` : '';
                    return `
                <div class="photo-card ${ST.admin?'admin-mode':''}" data-idx="${i}" data-pic-id="${p.id}" title="${esc(p.title||'')}">
                    <img src="${esc(p.url)}" loading="lazy" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 150%22><rect fill=%22%23ccc%22 width=%22200%22 height=%22150%22/><text x=%22100%22 y=%2280%22 text-anchor=%22middle%22 fill=%22%23999%22 font-size=%2214%22>加载失败</text></svg>'" alt="${esc(p.title||'图片')}">
                    <div class="photo-card-overlay">
                        <span class="photo-card-title">${esc(p.title||'无标题')}</span>
                        ${tagsHtml?`<div class="photo-card-tags">${tagsHtml}${moreTag}</div>`:''}
                    </div>
                    <button class="btn-del-photo" data-id="${p.id}" title="删除此图片">🗑️</button>
                </div>`;
                }).join('');
            };

            // ============ Gallery事件委托 ============
            $('#gallery').onclick = async e => {
                // 删除按钮
                const delBtn = e.target.closest('.btn-del-photo');
                if (delBtn && ST.admin) {
                    e.stopPropagation();
                    if (confirm('确定删除此图片？此操作不可恢复。')) {
                        try {
                            await API.req(`/photos/${delBtn.dataset.id}`, { method: 'DELETE' });
                            toast('已删除', 'success');
                            await loadAll();
                        } catch (err) {
                            toast('删除失败: ' + err.message, 'error');
                        }
                    }
                    return;
                }
                // 标签点击（在overlay中）
                const tagSpan = e.target.closest('.photo-card-tag');
                if (tagSpan && tagSpan.dataset.tag) {
                    e.stopPropagation();
                    const tag = tagSpan.dataset.tag;
                    const idx = ST.filterTags.indexOf(tag);
                    if (idx >= 0) {
                        ST.filterTags.splice(idx, 1);
                    } else {
                        ST.filterTags.push(tag);
                    }
                    renderTagFilter();
                    renderGal();
                    return;
                }
                // 图片卡片点击 -> Lightbox
                const card = e.target.closest('.photo-card');
                if (card) {
                    const filtered = getFilteredPics();
                    const idx = parseInt(card.dataset.idx);
                    if (idx >= 0 && idx < filtered.length) {
                        ST.lbIdx = idx;
                        ST._lbSource = filtered; // 保存当前lightbox的图片来源
                        $('#lightbox').classList.add('active');
                        document.body.style.overflow = 'hidden';
                        showLb();
                    }
                }
            };

            // ============ Lightbox ============
            const showLb = () => {
                const source = ST._lbSource || getFilteredPics();
                const p = source[ST.lbIdx];
                if (!p) return;
                $('#lbContent').innerHTML = `<img src="${esc(p.url)}" alt="${esc(p.title||'')}">`;
                const ptags = typeof p.tags === 'string' ?
                    p.tags.split(',').map(t => t.trim()).filter(t => t) :
                    (Array.isArray(p.tags) ? p.tags : []);
                const tagsHtml = ptags.length > 0 ?
                    `<span class="lb-tags-inline">${ptags.map(t=>`<span>${esc(t)}</span>`).join('')}</span>` : '';
                $('#lbInfo').innerHTML =
                    `${esc(p.title||'无标题')} (${ST.lbIdx+1}/${source.length})${tagsHtml}`;
            };

            const closeLb = () => {
                $('#lightbox').classList.remove('active');
                document.body.style.overflow = '';
                ST._lbSource = null;
            };

            $('#lbClose').onclick = (e) => { e.stopPropagation();
                closeLb(); };
            $('#lbPrev').onclick = (e) => {
                e.stopPropagation();
                const source = ST._lbSource || getFilteredPics();
                ST.lbIdx = (ST.lbIdx - 1 + source.length) % source.length;
                showLb();
            };
            $('#lbNext').onclick = (e) => {
                e.stopPropagation();
                const source = ST._lbSource || getFilteredPics();
                ST.lbIdx = (ST.lbIdx + 1) % source.length;
                showLb();
            };
            // 点击lightbox背景关闭
            $('#lightbox').onclick = function(e) {
                if (e.target === this || e.target.id === 'lbContent') {
                    closeLb();
                }
            };

            // ============ 键盘导航 ============
            document.addEventListener('keydown', e => {
                if ($('#lightbox').classList.contains('active')) {
                    if (e.key === 'Escape') { e.preventDefault();
                        closeLb(); return; }
                    if (e.key === 'ArrowLeft') { e.preventDefault();
                        $('#lbPrev').click(); return; }
                    if (e.key === 'ArrowRight') { e.preventDefault();
                        $('#lbNext').click(); return; }
                }
                // 全局ESC关闭模态框
                if (e.key === 'Escape') {
                    const activeModal = document.querySelector('.modal-overlay.active');
                    if (activeModal && activeModal.id !== 'lightbox') {
                        activeModal.classList.remove('active');
                        document.body.style.overflow = '';
                    }
                }
            });

            // ============ 模态框关闭（点击遮罩） ============
            document.querySelectorAll('.modal-overlay').forEach(overlay => {
                overlay.addEventListener('click', function(e) {
                    if (e.target === this) {
                        this.classList.remove('active');
                        document.body.style.overflow = '';
                    }
                });
            });

            // ============ 认证相关 ============
            $('#btnAuth').onclick = () => auth($('#authPwd').value);
            $('#authPwd').onkeyup = e => { if (e.key === 'Enter') auth(e.target.value); };
            $('#btnLogout').onclick = () => {
                ST.admin = false;
                ST.tk = '';
                ST.filterTags = [];
                localStorage.removeItem('tk');
                updateUI();
                renderGal();
                renderTabs();
                renderTagFilter();
                toast('已退出管理', 'info');
            };

            // ============ 关闭按钮 ============
            $$('.close-modal').forEach(b => b.onclick = e => {
                const overlay = e.target.closest('.modal-overlay');
                if (overlay) { overlay.classList.remove('active');
                    document.body.style.overflow = ''; }
            });

            // ============ 添加图片 ============
            $('#btnAddPhoto').onclick = () => {
                if (!ST.albs.length) return toast('请先创建相册', 'info');
                const filteredAlbs = ST.filterCategory === 'all' ?
                    ST.albs :
                    ST.albs.filter(a => (a.category || 'other') === ST.filterCategory);
                const displayAlbs = filteredAlbs.length > 0 ? filteredAlbs : ST.albs;
                $('#selAlbum').innerHTML = displayAlbs.map(a => {
                    const catInfo = CATEGORIES.find(c => c.id === (a.category || 'other'));
                    return `<option value="${a.id}">${catInfo?catInfo.icon:'📦'} ${esc(a.name)}</option>`;
                }).join('');
                ST.files = [];
                ST.tagInputTags = [];
                $('#previewBox').innerHTML = '';
                $('#urlInp').value = '';
                $('#picTitle').value = '';
                $('#tagInput').value = '';
                renderTagInputChips();
                $('#modalPhoto').classList.add('active');
                document.body.style.overflow = '';
            };

            // 标签输入管理
            const renderTagInputChips = () => {
                const wrap = $('#tagInputWrap');
                const input = $('#tagInput');
                // 清除现有chips
                const existingChips = wrap.querySelectorAll('.tag-item');
                existingChips.forEach(c => c.remove());
                // 重新插入chips（在input之前）
                ST.tagInputTags.forEach((tag, idx) => {
                    const chip = document.createElement('span');
                    chip.className = 'tag-item';
                    chip.innerHTML =
                        `${esc(tag)}<span class="tag-remove" data-idx="${idx}">×</span>`;
                    wrap.insertBefore(chip, input);
                });
            };

            $('#tagInputWrap').onclick = function(e) {
                const removeBtn = e.target.closest('.tag-remove');
                if (removeBtn) {
                    const idx = parseInt(removeBtn.dataset.idx);
                    ST.tagInputTags.splice(idx, 1);
                    renderTagInputChips();
                    $('#tagInput').focus();
                    return;
                }
                $('#tagInput').focus();
            };

            $('#tagInput').onkeydown = function(e) {
                if (e.key === 'Enter' || e.key === ',') {
                    e.preventDefault();
                    const val = this.value.trim().replace(/,/g, '').trim();
                    if (val && !ST.tagInputTags.includes(val) && ST.tagInputTags.length < 15) {
                        ST.tagInputTags.push(val);
                        this.value = '';
                        renderTagInputChips();
                    } else if (ST.tagInputTags.length >= 15) {
                        toast('最多添加15个标签', 'info');
                    }
                }
                if (e.key === 'Backspace' && this.value === '' && ST.tagInputTags.length > 0) {
                    ST.tagInputTags.pop();
                    renderTagInputChips();
                }
            };
            // 处理粘贴（逗号分隔）
            $('#tagInput').onpaste = function(e) {
                setTimeout(() => {
                    const val = this.value;
                    if (val.includes(',')) {
                        const parts = val.split(',').map(t => t.trim()).filter(t => t);
                        parts.forEach(t => {
                            if (!ST.tagInputTags.includes(t) && ST.tagInputTags.length < 15) {
                                ST.tagInputTags.push(t);
                            }
                        });
                        this.value = '';
                        renderTagInputChips();
                    }
                }, 50);
            };

            // 文件上传
            $('#dropZone').onclick = () => $('#fileInp').click();
            $('#fileInp').onchange = e => {
                for (let f of e.target.files) {
                    if (f.size > 20 * 1024 * 1024) { toast(`${f.name} 超过20MB`, 'error'); continue; }
                    ST.files.push(f);
                    const r = new FileReader();
                    r.onload = ev => {
                        $('#previewBox').innerHTML +=
                            `<img src="${ev.target.result}" alt="预览" title="${esc(f.name)}">`;
                    };
                    r.readAsDataURL(f);
                }
                $('#fileInp').value = '';
            };

            // 拖拽上传
            $('#dropZone').addEventListener('dragover', function(e) {
                e.preventDefault();
                this.classList.add('drag-over');
            });
            $('#dropZone').addEventListener('dragleave', function(e) {
                e.preventDefault();
                this.classList.remove('drag-over');
            });
            $('#dropZone').addEventListener('drop', function(e) {
                e.preventDefault();
                this.classList.remove('drag-over');
                const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith(
                'image/'));
                files.forEach(f => {
                    if (f.size > 20 * 1024 * 1024) { toast(`${f.name} 超过20MB`, 'error'); return; }
                    ST.files.push(f);
                    const r = new FileReader();
                    r.onload = ev => {
                        $('#previewBox').innerHTML +=
                            `<img src="${ev.target.result}" alt="预览" title="${esc(f.name)}">`;
                    };
                    r.readAsDataURL(f);
                });
            });

            // 保存图片
            $('#btnSavePhoto').onclick = async () => {
                const aid = $('#selAlbum').value;
                const t = $('#picTitle').value.trim();
                const urls = $('#urlInp').value.split('\n').map(u => u.trim()).filter(u => u);
                const tagsStr = ST.tagInputTags.join(',');
                let c = 0;
                const errors = [];

                for (let u of urls) {
                    if (!/^https?:\/\//.test(u)) {
                        errors.push(`无效URL: ${u.substring(0, 25)}`);
                        continue;
                    }
                    try {
                        await API.req('/photos/url', {
                            method: 'POST',
                            body: JSON.stringify({ url: u, album_id: aid, title: t || '',
                                tags: tagsStr })
                        });
                        c++;
                    } catch (e) { errors.push(e.message); }
                }
                for (let i = 0; i < ST.files.length; i++) {
                    const f = ST.files[i];
                    const fd = new FormData();
                    const ft = t ? (ST.files.length > 1 ? `${t}-${i+1}` : t) : f.name.split('.')[0];
                    fd.append('file', f);
                    fd.append('album_id', aid);
                    fd.append('title', ft);
                    fd.append('tags', tagsStr);
                    try {
                        await API.req('/photos', { method: 'POST', body: fd });
                        c++;
                    } catch (e) { errors.push(e.message); }
                }
                if (c > 0) {
                    toast(`✅ 成功添加 ${c} 张`, 'success');
                    $('#modalPhoto').classList.remove('active');
                    document.body.style.overflow = '';
                    ST.files = [];
                    ST.tagInputTags = [];
                    $('#previewBox').innerHTML = '';
                    await loadAll();
                }
                if (errors.length > 0) {
                    errors.forEach(e => toast('❌ ' + e, 'error'));
                }
                if (c === 0 && errors.length === 0) {
                    toast('请选择文件或输入URL', 'info');
                }
            };

            // ============ 相册管理 ============
            $('#btnAddAlbum').onclick = () => {
                $('#editAlbumId').value = '';
                $('#albumName').value = '';
                $('#albumDesc').value = '';
                $('#albumCategory').value = 'other';
                $('#btnDelAlbum').style.display = 'none';
                $('#albumTitle').textContent = '📁 新建相册';
                // 填充分类下拉
                fillCategorySelect();
                $('#modalAlbum').classList.add('active');
                document.body.style.overflow = '';
            };

            const fillCategorySelect = () => {
                const sel = $('#albumCategory');
                sel.innerHTML = CATEGORIES.filter(c => c.id !== 'all').map(c =>
                    `<option value="${c.id}">${c.name}</option>`
                ).join('');
            };
            // 初始化时填充一次
            fillCategorySelect();

            $('#btnSaveAlbum').onclick = async () => {
                const id = $('#editAlbumId').value;
                const n = $('#albumName').value.trim();
                const d = $('#albumDesc').value.trim();
                const cat = $('#albumCategory').value || 'other';
                if (!n) return toast('请输入相册名称', 'error');
                try {
                    const body = { name: n, description: d, category: cat };
                    if (id) {
                        await API.req(`/albums/${id}`, { method: 'PUT', body: JSON.stringify(body) });
                    } else {
                        await API.req('/albums', { method: 'POST', body: JSON.stringify(body) });
                    }
                    toast('✅ 保存成功', 'success');
                    $('#modalAlbum').classList.remove('active');
                    document.body.style.overflow = '';
                    await loadAll();
                } catch (e) { toast('❌ ' + e.message, 'error'); }
            };

            // 删除相册
            $('#btnDelAlbum').onclick = async () => {
                const id = $('#editAlbumId').value;
                if (!id) return;
                if (!confirm(
                        '确定删除此相册？相册中的图片将变为未分类（不会删除图片文件）。\n\n此操作不可恢复。')) return;
                try {
                    await API.req(`/albums/${id}`, { method: 'DELETE' });
                    toast('✅ 相册已删除', 'success');
                    $('#modalAlbum').classList.remove('active');
                    document.body.style.overflow = '';
                    if (ST.curAlb === id) ST.curAlb = 'all';
                    await loadAll();
                } catch (e) { toast('❌ 删除失败: ' + e.message, 'error'); }
            };

            // ============ 设置 ============
            $('#btnSettings').onclick = () => {
                $('#setMode').value = ST.mode || 'local';
                $('#setToken').value = '';
                $('#setPwd').value = '';
                $('#smmsGrp').style.display = ST.mode === 'smms' ? '' : 'none';
                $('#modalSettings').classList.add('active');
                document.body.style.overflow = '';
            };
            $('#setMode').onchange = e => {
                $('#smmsGrp').style.display = e.target.value === 'smms' ? '' : 'none';
            };
            $('#btnSaveSet').onclick = async () => {
                const d = { storage_mode: $('#setMode').value, smms_token: $('#setToken').value || "" };
                if ($('#setPwd').value) d.new_password = $('#setPwd').value;
                try {
                    await API.req('/settings', { method: 'PUT', body: JSON.stringify(d) });
                    toast('✅ 设置已保存', 'success');
                    $('#modalSettings').classList.remove('active');
                    document.body.style.overflow = '';
                    await loadAll();
                } catch (e) { toast('❌ ' + e.message, 'error'); }
            };

            // ============ 初始化 ============
            const init = async () => {
                ST.tk = localStorage.getItem('tk');
                if (ST.tk) {
                    try {
                        await API.req('/verify-token');
                        ST.admin = true;
                    } catch (e) {
                        ST.tk = '';
                        localStorage.removeItem('tk');
                        ST.admin = false;
                    }
                }
                updateUI();
                checkHash();
                await loadAll();
                // 初始渲染分类下拉
                fillCategorySelect();
            };

            // 监听hash变化
            window.addEventListener('hashchange', checkHash);

            // 启动
            init().catch(e => {
                console.error('初始化失败:', e);
                ST.albs = [];
                ST.pics = [];
                ST.allPicsCache = [];
                renderCategoryBar();
                renderTabs();
                renderTagFilter();
                renderGal();
                updateUI();
            });

            // ============ 移动端长按相册编辑 ============
            let longPressTimer;
            $('#albumTabs').addEventListener('touchstart', function(e) {
                if (!ST.admin) return;
                const t = e.target.closest('.album-tab');
                if (!t || t.dataset.id === 'all') return;
                longPressTimer = setTimeout(() => {
                    const alb = ST.albs.find(a => String(a.id) === String(t.dataset.id));
                    if (alb) {
                        // 触觉反馈（如果支持）
                        if (navigator.vibrate) navigator.vibrate(15);
                        openAlbumEditor(alb);
                    }
                }, 600);
            }, { passive: true });
            $('#albumTabs').addEventListener('touchend', function() {
                clearTimeout(longPressTimer);
            });
            $('#albumTabs').addEventListener('touchmove', function() {
                clearTimeout(longPressTimer);
            });

            console.log('📷 公开相册已就绪 | 支持分类筛选 + 标签系统 | 访问 #/admin 进入管理');
        })();
    </script>
</body>
</html>
